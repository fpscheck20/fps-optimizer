<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPSCheck - Frame Rate Optimizer</title>
    <style>
        body { background: #0a0a0a; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: #161616; padding: 2rem; border-radius: 12px; text-align: center; width: 100%; max-width: 320px; border: 1px solid #333; }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .mode-btn { background: #2a2a2a; color: white; }
        .scan-btn { background: #007bff; color: white; }
        .upgrade-btn { background: #ff9900; color: black; text-decoration: none; display: block; padding: 12px; border-radius: 6px; margin-top: 15px; font-weight: bold; }
        .legal-footer { font-size: 10px; color: #aaaaaa; margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card">
        <h1>FPSCheck</h1>
        <button class="btn mode-btn" onclick="setMode('PC')">PC GAMING</button>
        <button class="btn mode-btn" onclick="setMode('Mobile')">MOBILE GAMING</button>
        <button class="btn scan-btn" onclick="runBenchmark()">START BENCHMARK</button>
        
        <div id="result"></div>
        
        <div class="legal-footer">
            Disclosure: As an Amazon Associate, I earn from qualifying purchases.
        </div>
    </div>
    <script>
        let mode = '';
        function setMode(m) { mode = m; alert(m + " mode selected"); }
        function runBenchmark() {
            if(!mode) { alert("Please select a mode first!"); return; }
            document.getElementById('result').innerHTML = "Scanning hardware...";
            setTimeout(() => {
                const link = mode === 'PC' ? 'https://www.amazon.com/s?k=RTX+4070&tag=fpscheck-20' : 'https://www.amazon.com/s?k=Razer+Phone+Cooler&tag=fpscheck-20';
                document.getElementById('result').innerHTML = "Bottleneck detected!<br><a href='" + link + "' class='upgrade-btn'>UPGRADE NOW</a>";
            }, 1000);
        }
    </script>
</body>
</html>
